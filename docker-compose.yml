services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: dejankify
      POSTGRES_PASSWORD: dejankify_dev
      POSTGRES_DB: dejankify
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dejankify"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
